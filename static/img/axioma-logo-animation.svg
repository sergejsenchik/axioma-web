  <style>
    @keyframes draw {
      to { stroke-dashoffset: 0; }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .sign-path {
      stroke: #E08061;
      stroke-width: 1.7;
      fill: none;
      animation: draw 0.8s ease-out forwards;
    }
    .text-path {
      opacity: 0;
      fill: #E08061;
      animation: fadeIn 0.6s ease-in forwards;
    }

    #circle  { stroke-dasharray: 180; stroke-dashoffset: 180; animation-delay: 0.3s; }
    #zigzag  { stroke-dasharray: 275; stroke-dashoffset: 275; animation-delay: 0.5s; }
    #a-shape { stroke-dasharray: 130; stroke-dashoffset: 130; animation-delay: 0.7s; }
    #v-line  { stroke-dasharray: 60;  stroke-dashoffset: 60;  animation-delay: 0.9s; }
    #h-line  { stroke-dasharray: 30;  stroke-dashoffset: 30;  animation-delay: 1.0s; }

    .text-path { animation-delay: 1.4s; }
  </style>

